<!doctype html>
<html>
  <head>
    <title>List</title>
  </head>
  <body>
    <h1>List</h1>
    <h2>Ordered List</h2>
    <ol>
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
    </ol>

    <h3>Jenis-Jenis</h3>
    <ol type="A">
      <li>Item A</li>
      <li>Item B</li>
      <li>Item C</li>
    </ol>

    <ol type="I">
      <li>Item I</li>
      <li>Item II</li>
    </ol>

    <h2>Unordered List</h2>
    <ul>
      <li>Meja</li>
      <li>Kursi</li>
      <li>Lemari</li>
    </ul>

    <h3>Jenis-Jenis</h3>
    <ul type="circle">
      <li>Kasur</li>
      <li>Bantal</li>
      <li>Guling</li>
    </ul>

    <ul type="disc">
      <li>Kaos</li>
      <li>Celana</li>
    </ul>

    <ul type="square">
      <li>Sepatu</li>
      <li>Sandal</li>
    </ul>
  </body>
</html>
