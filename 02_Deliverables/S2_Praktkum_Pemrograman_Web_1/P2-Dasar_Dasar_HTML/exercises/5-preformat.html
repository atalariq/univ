    <h1>Preformat</h1>
    <pre>
Ini adalah
teks yang di-preformat.

entah itu              spasi
ataupun
line break

seperti ini.
    </pre>
    <p>Tag pre cocok untuk menampilkan source code, contohnya kode Python di bawah ini:</p>

for i in range(10):
  print(i)
