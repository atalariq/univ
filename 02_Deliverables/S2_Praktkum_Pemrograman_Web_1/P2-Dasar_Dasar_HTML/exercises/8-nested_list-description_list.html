<!doctype html>
<html>
  <head>
    <title>Nested List and Description List</title>
  </head>
  <body>
    <h1>Nested List and Description List</h1>
    <h2>Nested List</h2>
    <ol>
      <li>Item 1</li>
      <li>
        Item 2
        <ol>
          <li>Item 2.1</li>
          <li>
            Item 2.2
            <ol type="A">
              <li>Item 2.2.A</li>
              <li>Item 2.2.B</li>
              <li>Item 2.2.C</li>
            </ol>
          </li>
        </ol>
      </li>
      <li>
        Item 3
        <ul>
          <li>Apple</li>
          <li>Banana</li>
        </ul>
      </li>
    </ol>

    <h2>Description List</h2>
    <dl>
      <dt>Coffee</dt>
      <dd>Black hot drink</dd>
      <dt>Milk</dt>
      <dd>White cold drink</dd>
    </dl>
  </body>
</html>
